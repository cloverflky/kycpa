法律制度概述</h2><h3>1. 物的概念与种类</h3><div class="card-note"><p>✅ <strong>物权法上的物</strong>：有体物，具备有体性+可支配性+在人的身体之外。<br>📖 重要分类：动产/不动产；主物与从物（从物随主物）；原物与孳息（天然孳息归所有权人/用益物权人）。</p></div><div class="case-block"><div class="case-title">📖 教材案例·原物孳息归属</div><p>《民法典》第321条：<span class="highlight">天然孳息，由所有权人取得；既有所有权人又有用益物权人的，由用益物权人取得。</span>甲将果园承包给乙经营，果实由乙取得。</p></div><h3>2. 物权三大原则</h3><table><thead><tr><th>原则</th><th>核心内容</th></tr></thead><tbody><tr><td>物权法定</td><td>种类和内容由法律规定，违反种类法定→物权创设无效，但合同可能有效。</td></tr><tr><td>客体特定</td><td>一物一权，一个独立物上只能存在一个所有权。</td></tr><tr><td>公示原则</td><td>动产交付，不动产登记。</td></tr></tbody></table><h2>二、物权变动（★★★★★）</h2><div class="card-note"><p>基于法律行为：动产交付生效，不动产登记生效。例外：动产抵押权、地役权合同生效设立（登记对抗）。<br>非基于法律行为：继承、合法建造、法院判决等取得物权，未登记不得处分。</p></div><div class="case-block"><div class="case-title">🏠 非基于法律行为案例</div><p>乙继承甲住宅，自继承开始时取得所有权；转让前必须先登记至乙名下再过户给丙。</p></div><h3>交付的四种形态</h3><table><thead><tr><th>交付方式</th><th>生效时点</th></tr></thead><tbody><tr><td>现实交付</td><td>实际交付时</td></tr><tr><td>简易交付</td><td>法律行为生效时（受让人已占有）</td></tr><tr><td>指示交付</td><td>转让返还原物请求权协议生效时</td></tr><tr><td>占有改定</td><td>约定生效时（出卖人继续占有）</td></tr></tbody></table><h2>三、善意取得制度</h2><div class="card-note"><p>构成要件：无权处分 + 受让人善意 + 合理价格转让 + 动产交付/不动产登记。遗失物、盗窃物原则上不适用善意取得。</p></div><div class="case-block"><div class="case-title">💎 遗失物不适用善意取得</div><p>乙拾得甲丢失的手机，以市场价出让给丙，丙不构成善意取得，甲有权请求返还原物。</p></div><h2>四、担保物权（超级优先权）</h2><div class="card-note"><p>动产抵押超级优先权：价款抵押权在标的物交付后10日内办理抵押登记，优先于其他担保物权（留置权除外）。</p></div><div class="case-block"><div class="case-title">⚡ 超级优先权案例</div><p>汽车店为担保价款债权订立抵押合同并于交付后10日内登记 → 优先于其他抵押权人。</p></div><footer>完整版涵盖物权变动、共有、善意取得、抵押权顺位等全部高频考点。</footer></div></body></html>`

成本降低、库存周转、回款率显著改善。</p></div><h2>五、法律风险和合规风险</h2><div class="grid-2"><div class="card"><strong>⚖️ 法律责任</strong><br>违法违规处罚、诉讼应对→健全问责+专业法务团队+纠纷评估</div><div class="card"><strong>📜 监管风险</strong><br>证券交易/反商业贿赂/财税合规→完善内控+合规培训+贸易预判</div></div><div class="case-block"><div class="case-title">【案例8.5 津味饮料】</div><p>财务造假22亿，罚款1.9亿，投资者集体诉讼。应对：开除高管重组董事会，聘请知名律所重组，职业道德培训，完善证券内控，聘请安永重新审计。映射：法律责任风险、行为规范风险、监管风险。</p></div><div style="background:#eef2fa;border-radius:20px;padding:1rem;margin-top:1.5rem;"><strong>📌 考试提示：</strong> 运营风险13类为主观题高频，必须结合案例灵活运用“表现—应对”框架；本章常与内控指引结合考查综合题。</div></div></body></html>`

<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CPA财管·第四章 资本成本 | 完整版公式+模型+计算详解</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#f5f7fb;font-family:'Segoe UI',Roboto,sans-serif;line-height:1.55;color:#1e2a3e;padding:2rem 1rem;}.container{max-width:1280px;margin:0 auto;background:white;border-radius:28px;padding:2rem 2rem 2.5rem;box-shadow:0 20px 35px -12px rgba(0,0,0,0.1);}h1{font-size:2rem;border-left:6px solid #2b6e9e;padding-left:20px;margin-bottom:12px;background:linear-gradient(135deg,#1e3c72,#2b4c7c);-webkit-background-clip:text;background-clip:text;color:transparent;}.importance-high{background:#fee2e2;border-left:5px solid #ef4444;padding:10px 18px;border-radius:16px;margin:16px 0;font-weight:500;}.formula-card{background:#f1f5f9;border-radius:20px;padding:16px 20px;margin:16px 0;font-family:'Courier New',monospace;border:1px solid #cbdde9;overflow-x:auto;font-weight:600;}.grid-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:20px;margin:24px 0;}.card{background:#fff;border:1px solid #e2edf7;border-radius:20px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,0.02);}.card strong{color:#1e4a76;}table{width:100%;border-collapse:collapse;margin:20px 0;}th{background:#eef2ff;padding:10px;}td{padding:8px 12px;border-bottom:1px solid #e2e8f0;}.footer-note{background:#ecfdf5;padding:18px;border-radius:20px;margin-top:32px;text-align:center;}</style></head><body><div class="container"><h1>📘 第四章 资本成本 · 完整版知识点梳理</h1><div class="importance-high">★★★ 核心：资本成本是机会成本，也是投资必要报酬率；连接筹资与投资的桥梁。高频主观题：债务成本估计（到期收益率/风险调整法）、CAPM、股利增长模型、WACC计算。</div><h2>一、资本成本概述</h2><div class="grid-list"><div class="card"><strong>公司资本成本</strong><br>加权平均成本(WACC)：取决于无风险利率、经营风险溢价、财务风险溢价。<br>应用：投资决策(折现率)、筹资决策、业绩评价(EVA)。</div><div class="card"><strong>项目资本成本</strong><br>项目自身风险决定。若项目风险=公司平均风险，则项目成本=WACC；风险更高则成本更高。</div><div class="card"><strong>影响因素</strong><br>外部：无风险利率、市场风险溢价、税率。<br>内部：资本结构、投资政策（资产平均风险）。</div></div><h2>二、债务资本成本估计 ★★★</h2><div class="formula-card">税前债务成本 → 税后成本 = 税前 × (1-所得税率)</div><div class="grid-list"><div class="card"><strong>① 到期收益率法</strong><br>有上市债券：P0 = ∑利息/(1+rd)^t + 本金/(1+rd)^n，内插法求解rd。一年多次付息需换算有效年利率。</div><div class="card"><strong>② 可比公司法</strong><br>无上市债但有可比公司（同行业/规模/负债率），参照可比公司长期债券到期收益率。</div><div class="card"><strong>③ 风险调整法</strong><br>有信用评级：税前债务成本 = 无风险利率 + 信用风险补偿率（同级公司债收益-政府债收益平均值）。</div><div class="card"><strong>④ 财务比率法</strong><br>无评级无上市债 → 根据财务比率推断信用级别，再用风险调整法。</div></div><div class="importance-high">⚠️ 注意：承诺收益 vs 期望收益（财务困境时用期望收益）；历史成本是沉没成本，决策使用未来成本。</div><h2>三、普通股资本成本估计 ★★★</h2><h3>📐 1. 资本资产定价模型(CAPM)</h3><div class="formula-card">r<sub>s</sub> = r<sub>RF</sub> + β × (r<sub>m</sub> - r<sub>RF</sub>)</div><div class="grid-list"><div class="card"><strong>无风险利率</strong><br>通常选长期政府债券(10年期)到期收益率；名义利率（含通胀）。</div><div class="card"><strong>β系数</strong><br>历史期间5年以上，收益间隔常用周或月；β驱动因素：经营风险+财务风险。</div><div class="card"><strong>市场风险溢价</strong><br>历史数据几何平均法更优，涵盖经济周期。</div></div><h3>🌱 2. 股利增长模型</h3><div class="formula-card">r<sub>s</sub> = D<sub>1</sub> / P<sub>0</sub> + g &nbsp;&nbsp; (D<sub>1</sub>=D<sub>0</sub>×(1+g))</div><div class="grid-list"><div class="card"><strong>历史增长率</strong><br>几何平均增长率 g = (FV/PV)^(1/n) - 1，适合长期持有假设。</div><div class="card"><strong>可持续增长率</strong><br>不增发新股、经营效率不变：g = 期初权益预期净利率 × 利润留存率。</div><div class="card"><strong>分析师预测</strong><br>综合多位分析师预期，多阶段折现求rs最为可靠。</div></div><h3>⚖️ 3. 债券收益率风险调整模型</h3><div class="formula-card">r<sub>s</sub> = 税后债务成本 + 风险溢价（经验值3%~5%）</div><div class="importance-high">📌 考虑发行费用的普通股成本：r<sub>s</sub> = D<sub>1</sub> / [P<sub>0</sub>×(1-F)] + g ，外部股权成本高于留存收益。</div><h2>四、混合筹资资本成本（优先股&永续债）</h2><div class="grid-list"><div class="card"><strong>优先股</strong><br>分类为权益工具：r<sub>p</sub> = D<sub>p</sub> / [P<sub>p</sub>×(1-F)]<br>分类为金融负债：税前同公式，税后=税前×(1-T)。</div><div class="card"><strong>永续债</strong><br>r<sub>pd</sub> = I<sub>pd</sub> / [P<sub>pd</sub>×(1-F)]；利息税务处理依据分类。</div></div><h2>五、加权平均资本成本(WACC) ★★★</h2><div class="formula-card">WACC = (税后债务成本 × 债务权重) + (优先股成本 × 优先股权重) + (普通股成本 × 权益权重)</div><div class="grid-list"><div class="card"><strong>权重选择</strong><br>账面价值权重（易取得但可能扭曲）、市场价值权重（反映当前）、目标资本结构权重（最适合未来决策）。</div><div class="card"><strong>决策原则</strong><br>折现率与现金流量风险匹配，项目风险偏离公司平均风险时需调整项目资本成本。</div></div><div class="footer-note"><strong>🔥 高频计算提示：</strong> WACC计算需综合税后债务成本、权益成本；考试常用市场价值权重或目标权重。CAPM与股利增长模型结合考点密集，务必掌握β估计、无风险利率选择、g的预测方法。</div><div style="background:#eef2ff;border-radius:20px;padding:16px;margin-top:24px;"><p>📌 能力等级要求：资本成本概念(2级)、债务/普通股/混合筹资估计方法(3级)、WACC计算(2级)。历年真题分值约6~8分，计算题必考板块。</p></div></div></body></html>`

                const doc = iframe.contentWindow.document;
                const height = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, doc.body.offsetHeight);
                iframe.style.height = (height + 40) + "px";
            } catch(e) { console.warn("height auto error", e); }
        };
    }

    renderSidebar();
    renderContent("财管", "资本成本");
</script>
</body>
</html>
